<h2 id="环境配置"><a href="#环境配置" class="headerlink" title="环境配置"></a>环境配置</h2><h3 id="1-安装-nodejs"><a href="#1-安装-nodejs" class="headerlink" title="1. 安装 nodejs"></a>1. 安装 nodejs</h3><p>参考: <a target="_blank" rel="noopener" href="https://nodejs.org/zh-cn/">nodejs.org</a></p>
<h3 id="2-克隆项目"><a href="#2-克隆项目" class="headerlink" title="2. 克隆项目"></a>2. 克隆项目</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ git <span class="built_in">clone</span> git@[bongmi-gitlab-host]:bongmi/bongmi-blog.git</span><br></pre></td></tr></table></figure>

<h3 id="3-初始化博客的运行环境"><a href="#3-初始化博客的运行环境" class="headerlink" title="3. 初始化博客的运行环境"></a>3. 初始化博客的运行环境</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ sh manager.sh ensure_env</span><br></pre></td></tr></table></figure>

<h3 id="4-开通权限"><a href="#4-开通权限" class="headerlink" title="4. 开通权限"></a>4. 开通权限</h3><p>将 github 账号提供给 <a href="mailto:&#104;&#97;&#110;&#108;&#105;&#110;&#x67;&#64;&#x62;&#x6f;&#x6e;&#x67;&#109;&#105;&#46;&#x63;&#111;&#109;">&#104;&#97;&#110;&#108;&#105;&#110;&#x67;&#64;&#x62;&#x6f;&#x6e;&#x67;&#109;&#105;&#46;&#x63;&#111;&#109;</a> 并接受邀请</p>
<h2 id="编辑与发布"><a href="#编辑与发布" class="headerlink" title="编辑与发布"></a>编辑与发布</h2><h3 id="1-新建一篇博文"><a href="#1-新建一篇博文" class="headerlink" title="1. 新建一篇博文"></a>1. 新建一篇博文</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ sh manager.sh new [file_name]</span><br></pre></td></tr></table></figure>

<h3 id="2-编辑博文"><a href="#2-编辑博文" class="headerlink" title="2. 编辑博文"></a>2. 编辑博文</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ sh manager.sh open [file_name]</span><br></pre></td></tr></table></figure>

<p>or </p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ sh manager.sh edit [file_name]</span><br></pre></td></tr></table></figure>

<h3 id="3-本地实时预览博客"><a href="#3-本地实时预览博客" class="headerlink" title="3. 本地实时预览博客"></a>3. 本地实时预览博客</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">$ sh manager.sh run</span><br></pre></td></tr></table></figure>
